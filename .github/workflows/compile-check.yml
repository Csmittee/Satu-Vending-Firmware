name: Firmware Compile Check

on:
  push:
    branches: ['**']
    paths:
      - 'firmware/**'
  pull_request:
    branches: [main]
    paths:
      - 'firmware/**'

jobs:
  compile:
    name: Compile ESP32-S3 Firmware
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install arduino-cli
        uses: arduino/setup-arduino-cli@v2

      - name: Configure arduino-cli
        run: |
          arduino-cli config init
          arduino-cli config set board_manager.additional_urls \
            https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json

      - name: Install ESP32 core 2.0.17 (locked — never change)
        run: |
          arduino-cli core update-index
          arduino-cli core install esp32:esp32@2.0.17

      - name: Install libraries (locked versions)
        run: |
          arduino-cli lib update-index
          arduino-cli lib install "GFX Library for Arduino"@1.4.9
          arduino-cli lib install "PNGdec"@1.1.6
          arduino-cli lib install "TAMC_GT911"
          arduino-cli lib install "ArduinoJson"
          arduino-cli lib install "Adafruit MCP23017 Arduino Library"
          arduino-cli lib install "FastLED"

      - name: Create config.h for CI (empty credentials — compile only)
        run: |
          cat > firmware/config.h << 'CONFEOF'
          #ifndef CONFIG_H
          #define CONFIG_H
          const char* WIFI_SSID     = "";
          const char* WIFI_PASSWORD = "";
          const char* API_BASE_URL  = "https://api.janishammer.com";
          #define NUM_SLOTS      21
          #define NUM_COLS        7
          #define MAX_SLOTS_HW   21
          #define MACHINE_LANES  10
          #define I2C_SDA        19
          #define I2C_SCL        20
          #define UART_RX        44
          #define UART_TX        43
          #define LED_DATA_PIN    5
          #define TFT_BL          2
          #define MCP1_ADDR    0x20
          #define MCP2_ADDR    0x21
          #define MCP3_ADDR    0x22
          extern const int mcp1_sensors[8];
          extern const int mcp1_relays[6];
          extern const int mcp2_sensors[2];
          extern const int mcp2_relays[6];
          #define RELAY_ON          HIGH
          #define RELAY_OFF         LOW
          #define SENSOR_TRIGGERED  LOW
          #define SENSOR_CLEAR      HIGH
          #define RELAY_FLAP        12
          #define PAYMENT_TIMEOUT   30000
          #define VEND_TIMEOUT      10000
          #define HEARTBEAT_INTERVAL 300000
          #define VEND_MAX_SPIN_MS  30000
          #define SENSOR_POLL_MS        10
          #define PRODUCT_SELECTION_TIMEOUT 15
          #define FLAP_RELOCK_TIMEOUT 3000
          #define FLAP_PROXIMITY_MCP_PIN -1
          #define SPEAKER_PIN           -1
          #define NUM_LEDS           40
          #define LED_BRIGHTNESS     128
          #define ZONE_TOP_START      0
          #define ZONE_TOP_END        9
          #define ZONE_FLOOR1_START  10
          #define ZONE_FLOOR1_END    19
          #define ZONE_FLOOR2_START  20
          #define ZONE_FLOOR2_END    29
          #define ZONE_DOOR_START    30
          #define ZONE_DOOR_END      39
          #endif
          CONFEOF

      - name: Compile firmware
        run: |
          cp -r firmware satu_vending
          # FQBN must match owner Arduino IDE Tools menu exactly — last verified 2026-06-21
          # Any board setting change -> update this line to match (R-165)
          arduino-cli compile \
            --fqbn esp32:esp32:esp32s3:CDCOnBoot=default,FlashSize=16M,PartitionScheme=app3M_fat9M_16MB,PSRAM=opi,UploadSpeed=460800 \
            --warnings default \
            --output-dir ./build \
            satu_vending/

      - name: List build output (confirms exact paths — not guessing)
        if: success()
        run: ls -la ./build/

      - name: Upload firmware artifact (3 files required for full flash)
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: satu-firmware-${{ github.run_number }}
          path: |
            ./build/satu_vending.ino.bootloader.bin
            ./build/satu_vending.ino.partitions.bin
            ./build/satu_vending.ino.bin
          retention-days: 7

      - name: Compile result
        if: always()
        run: echo "Compile finished — check step above for errors"
